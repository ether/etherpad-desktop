appId: org.etherpad.desktop
productName: Etherpad Desktop
copyright: Copyright (c) 2026 The Etherpad Foundation

directories:
  buildResources: build
  output: release

files:
  - 'out/**/*'
  - 'package.json'
  - '!**/*.{md,map,ts,tsx}'

asar: true
asarUnpack:
  - 'out/preload/index.cjs'

linux:
  target:
    - AppImage
    - deb
    - snap
  category: Office
  icon: build/icons/
  description: Native desktop client for Etherpad
  maintainer: Etherpad Foundation <noreply@etherpad.org>
  desktop:
    entry:
      Name: Etherpad Desktop
      Comment: Native desktop client for Etherpad
      Categories: Office;TextEditor;
      StartupWMClass: etherpad-desktop

win:
  target:
    # NSIS — proper installer with shortcuts and an uninstaller.
    - target: nsis
      arch: x64
    # Portable — single-file .exe that runs without installing.
    # Same binary, no shortcuts, no uninstaller. Useful for testers.
    - target: portable
      arch: x64
  icon: build/icons/icon.ico
  # Beta: ship UNSIGNED. Windows SmartScreen will warn on first run;
  # that's expected for an unsigned build. Signing requires an EV
  # cert — out of scope for v0 beta.
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Etherpad Desktop
  artifactName: ${productName}-Setup-${version}.${ext}

portable:
  artifactName: ${productName}-${version}-portable.${ext}

mac:
  target:
    # DMG is the canonical macOS distribution format. Build for both
    # Apple Silicon and Intel so testers on either architecture work.
    - target: dmg
      arch:
        - arm64
        - x64
    # Zip is what electron-updater prefers for delta updates on macOS;
    # smaller and faster to download than the dmg.
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icons/icon.icns
  category: public.app-category.productivity
  # Beta: ship UNSIGNED. Without an Apple Developer ID + notarisation,
  # macOS Gatekeeper will block first launch with "Etherpad Desktop
  # cannot be opened because the developer cannot be verified" — users
  # need to Right-click → Open the first time. Signing + notarisation
  # is on the roadmap for the v1 release.
  identity: null
  # Hardened runtime is required for notarisation; with identity:null
  # we explicitly turn it off so build doesn't try to enable it.
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
  # Skip code signing the dmg too (paired with mac.identity:null above).
  sign: false

deb:
  packageCategory: editors
  depends:
    - libnotify4
    - libnss3
    - libxtst6
    - libgtk-3-0
    - libasound2

appImage:
  artifactName: ${productName}-${version}.${ext}

snap:
  grade: stable
  confinement: strict
  # Etherpad Desktop needs network for talking to user-supplied Etherpad
  # servers, plus the standard Electron desktop plugs.
  plugs:
    - default
    - network
    - network-bind
    - home
    - removable-media
    - browser-sandbox
  # The snap-store base. core24 (Ubuntu 24.04) matches our Node 22 baseline.
  base: core24
  # Display name in the Snap Store
  summary: Native desktop client for Etherpad
  description: |
    Etherpad Desktop is a native client for Etherpad, the real-time
    collaborative editor. It provides per-workspace session isolation,
    native menus and shortcuts, dark mode, multi-window support, and
    background updates.

    Connect to any Etherpad server, switch between multiple workspaces
    in a Slack-style sidebar, and pin pads you visit often.

    Upstream: https://etherpad.org
    Source:   https://github.com/ether/etherpad-desktop

publish:
  - provider: github
    owner: ether
    repo: etherpad-desktop
