# Automated version bump + changelog + tag based on conventional commits.
#
# How this works:
#   1. Every push to main runs this workflow.
#   2. release-please scans new commits since the last release tag.
#      - feat:  → minor bump
#      - fix:   → patch bump
#      - feat!: or BREAKING CHANGE: → major bump
#   3. It opens (or updates) a single "chore: release vX.Y.Z" PR that bumps
#      package.json + writes CHANGELOG.md. The PR sits open until you
#      review/merge it.
#   4. Merging that PR creates the vX.Y.Z tag, which then triggers
#      release.yml (electron-builder) and snap-publish.yml automatically.
#
# Why a PR instead of direct push: keeps the release auditable, lets you
# squash unrelated WIP commits out of the changelog, and means "what's in
# the next release" is always visible at a glance.
#
# Ref: https://github.com/googleapis/release-please-action

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Manifest mode for the monorepo. Configuration lives in
          # release-please-config.json; current versions in
          # .release-please-manifest.json. The desktop package is the
          # only released package today; mobile/shell will be added
          # as separate components in later phases.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
