name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Fetch + install bundled Etherpad source (embedded server)
        run: pnpm --filter @etherpad/desktop fetch:etherpad
      - name: Build
        run: pnpm build
      - name: Package
        # Only AppImage + deb here. Snap is owned by snap-publish.yml
        # (separate job, separate credentials). Without an explicit list,
        # electron-builder reads the linux.target array in the YAML —
        # which includes snap — and tries to publish a snap to the Snap
        # Store from this job, which doesn't have the credentials.
        run: pnpm --filter @etherpad/desktop exec electron-builder --linux AppImage deb --config build/electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/latest-linux.yml
          retention-days: 14

  release-macos:
    # Builds DMG (Apple Silicon + Intel) and ZIP (electron-updater feed)
    # on a real macOS runner. UNSIGNED for the v0 beta — Gatekeeper
    # will warn on first launch; users right-click → Open the first
    # time, after which subsequent launches just work.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Fetch + install bundled Etherpad source (embedded server)
        run: pnpm --filter @etherpad/desktop fetch:etherpad
      - name: Build
        run: pnpm build
      - name: Package
        # --mac builds DMG + ZIP for both arm64 and x64. CSC_IDENTITY_AUTO_DISCOVERY=false
        # tells electron-builder NOT to sniff the keychain for a signing
        # identity (we don't have one for the beta).
        run: pnpm --filter @etherpad/desktop exec electron-builder --mac --config build/electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*-mac.zip
            packages/desktop/release/latest-mac.yml
          retention-days: 14

  release-windows:
    # Runs in parallel with the Linux job on every tag push. Builds an
    # NSIS installer + a portable .exe on a real Windows runner (we
    # could cross-compile via Wine on Linux, but Windows runner gives
    # the most predictable artefacts and avoids electron-builder's
    # Wine-specific quirks). Both artefacts are UNSIGNED for the v0
    # beta — Windows SmartScreen will warn the user the first time.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Fetch + install bundled Etherpad source (embedded server)
        run: pnpm --filter @etherpad/desktop fetch:etherpad
      - name: Build
        run: pnpm build
      - name: Package
        run: pnpm --filter @etherpad/desktop exec electron-builder --win --config build/electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/latest.yml
          retention-days: 14
