appId: org.etherpad.desktop
productName: Etherpad Desktop
copyright: Copyright (c) 2026 The Etherpad Foundation

directories:
  buildResources: build
  output: release

files:
  - 'out/**/*'
  - 'package.json'
  - '!**/*.{md,map,ts,tsx}'

# Etherpad source for the embedded server. Lives under
# `packages/desktop/resources/etherpad/` (fetched by
# `pnpm fetch:etherpad`). electron-builder copies the tree to the
# packaged app's `<resourcesPath>/etherpad/` — exactly where
# `findBundledEtherpadDir` looks at runtime. Tarred separately from
# asar so Node can spawn directly into the source files.
extraResources:
  - from: resources/etherpad
    to: etherpad
    filter:
      - '**/*'
      # Don't ship Etherpad's own playwright/test trees in the installer.
      - '!**/tests/**'
      - '!**/.git/**'
      - '!**/playwright.config.ts'

asar: true
asarUnpack:
  - 'out/preload/index.cjs'

linux:
  target:
    - AppImage
    - deb
    - snap
  # `package.json#name` is `@etherpad/desktop` (scoped). electron-builder
  # uses that as the default executable + artifact basename for the deb
  # and snap targets, and the `/` in the scope becomes a directory in
  # the output path — so deb/snap builds crash with "Parent directory
  # does not exist: release/@etherpad". Snap additionally crashes
  # earlier with "expected argument for flag '--executable'" because
  # the scoped name doesn't satisfy the snap binary-naming rules.
  # Pinning a slash-free executable name fixes both.
  executableName: etherpad-desktop
  category: Office
  icon: build/icons/
  description: Native desktop client for Etherpad
  maintainer: Etherpad Foundation <noreply@etherpad.org>
  desktop:
    entry:
      Name: Etherpad Desktop
      Comment: Native desktop client for Etherpad
      Categories: Office;TextEditor;
      StartupWMClass: etherpad-desktop

win:
  target:
    # NSIS — proper installer with shortcuts and an uninstaller.
    - target: nsis
      arch: x64
    # Portable — single-file .exe that runs without installing.
    # Same binary, no shortcuts, no uninstaller. Useful for testers.
    - target: portable
      arch: x64
  icon: build/icons/icon.ico
  # Beta: ship UNSIGNED. Windows SmartScreen will warn on first run;
  # that's expected for an unsigned build. Signing requires an EV
  # cert — out of scope for v0 beta.
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Etherpad Desktop
  artifactName: ${productName}-Setup-${version}.${ext}

portable:
  artifactName: ${productName}-${version}-portable.${ext}

mac:
  target:
    # DMG is the canonical macOS distribution format. Build for both
    # Apple Silicon and Intel so testers on either architecture work.
    - target: dmg
      arch:
        - arm64
        - x64
    # Zip is what electron-updater prefers for delta updates on macOS;
    # smaller and faster to download than the dmg.
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icons/icon.icns
  category: public.app-category.productivity
  # Beta: ship UNSIGNED. Without an Apple Developer ID + notarisation,
  # macOS Gatekeeper will block first launch with "Etherpad Desktop
  # cannot be opened because the developer cannot be verified" — users
  # need to Right-click → Open the first time. Signing + notarisation
  # is on the roadmap for the v1 release.
  identity: null
  # Hardened runtime is required for notarisation; with identity:null
  # we explicitly turn it off so build doesn't try to enable it.
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
  # Skip code signing the dmg too (paired with mac.identity:null above).
  sign: false

deb:
  packageCategory: editors
  depends:
    - libnotify4
    - libnss3
    - libxtst6
    - libgtk-3-0
    - libasound2

appImage:
  artifactName: ${productName}-${version}.${ext}

snap:
  grade: stable
  confinement: strict
  # The Snap Store auto-rejects builds with duplicate plug entries in
  # snap.json. electron-builder injects a default plug set that already
  # covers desktop / x11 / wayland / unity7 / browser-support / network /
  # home / etc. — listing the same plugs again here produces the
  # "['network', 'home', ...] has non-unique elements" rejection.
  #
  # Only list plugs that AREN'T in electron-builder's default set:
  #   - network-bind: needed if we ever bind a port (embedded Etherpad).
  #   - removable-media: read pads stored on a USB drive / SD card.
  #
  # The previous list also included `browser-sandbox`, which is NOT a
  # real Snap interface — manual store reviewers flag invalid plug
  # names as "potentially malicious" because they look like attempts
  # to request undeclared capabilities.
  plugs:
    - default
    - network-bind
    - removable-media
  # The snap-store base. core24 (Ubuntu 24.04) matches our Node 22 baseline.
  base: core24
  # Display name in the Snap Store
  summary: Native desktop client for Etherpad
  description: |
    Etherpad Desktop is a native client for Etherpad, the real-time
    collaborative editor. It provides per-workspace session isolation,
    native menus and shortcuts, dark mode, multi-window support, and
    background updates.

    Connect to any Etherpad server, switch between multiple workspaces
    in a Slack-style sidebar, and pin pads you visit often.

    Upstream: https://etherpad.org
    Source:   https://github.com/ether/etherpad-desktop

publish:
  - provider: github
    owner: ether
    repo: etherpad-desktop
